ne-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>bit[i] stores one suffix block [i - lowbit(i) + 1, i]</p></span></div></foreignObject></g></g><g class="node default" id="my-svg-flowchart-B-2" data-look="classic" transform="translate(448, 47)"><rect class="basic label-container" style="" x="-130" y="-39" width="260" height="78"/><g class="label" style="" transform="translate(-100, -24)"><rect/><foreignObject width="200" height="48"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>prefix(r): keep stripping the rightmost block</p></span></div></foreignObject></g></g><g class="node default" id="my-svg-flowchart-C-4" data-look="classic" transform="translate(448, 187)"><rect class="basic label-container" style="" x="-130" y="-51" width="260" height="102"/><g class="label" style="" transform="translate(-100, -36)"><rect/><foreignObject width="200" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>add(i, delta): climb to every larger block that still contains i</p></span></div></foreignObject></g></g><g class="node default" id="my-svg-flowchart-D-6" data-look="classic" transform="translate(758, 47)"><rect class="basic label-container" style="" x="-130" y="-39" width="260" height="78"/><g class="label" style="" transform="translate(-100, -24)"><rect/><foreignObject width="200" height="48"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Visited blocks are disjoint and tile [1, r]</p></span></div></foreignObject></g></g><g class="node default" id="my-svg-flowchart-E-8" data-look="classic" transform="tra