site_name: competitive-programming-cpp
site_description: Algorithms, C++ templates, and competitive programming practice ladders.
site_url: https://mtuann.github.io/competitive-programming-cpp/
repo_url: https://github.com/mtuann/competitive-programming-cpp
repo_name: mtuann/competitive-programming-cpp
edit_uri: edit/main/

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

docs_dir: site-docs
site_dir: site
use_directory_urls: true
not_in_nav: |
  /docs/topic-maps/*/*.md
  /practice/ladders/*/*/*.md
  !/practice/ladders/*/*/README.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/problem-finder.js
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mtuann/competitive-programming-cpp
      name: GitHub repository
    - icon: material/web
      link: https://mtuann.github.io/competitive-programming-cpp/
      name: Project website

